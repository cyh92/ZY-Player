name: x86-release-build

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - run: |
          yarn
          yarn dist
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.access_token }}
